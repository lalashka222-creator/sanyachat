<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="register-screen">
        <h2>Введите ваш номер</h2>
        <input type="text" id="my-number" placeholder="+7 999 123 45 67">
        <button id="register-btn">Получить код</button>
        <div id="code-section" style="display: none;">
            <p>Код: <span id="code-display"></span></p>
            <input type="text" id="code-input" placeholder="Введите код">
            <button id="verify-btn">Подтвердить</button>
        </div>
    </div>

    <div id="main-screen" style="display: none;">
        <div id="contact-list">
            <h3>Контакты</h3>
            <input type="text" id="search-input" placeholder="Поиск или новый номер...">
            <div id="contacts-container"></div>
        </div>
        <div id="chat-area">
            <div id="chat-header">Выберите контакт</div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Сообщение...">
                <button id="chat-send">Отправить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
